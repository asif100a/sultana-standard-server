app = "sultana-standard-server"
primary_region = "iad" # Replace with your preferred region (e.g., sin, ams, ord, etc.) during deployment

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
